name: lsp-routeros-ts CodeQL configuration

paths-ignore:
  # Build outputs are generated from the scanned source directories and can
  # duplicate alerts if they are ever committed for troubleshooting.
  - client/dist/**
  - server/dist/**
  - dist/**

# Prefer GitHub's maintained "security-and-quality" suite so this repository
# gets high-signal security findings plus quality issues for the extension, LSP
# server, and workflow-supporting JavaScript/TypeScript code.
queries:
  - uses: security-and-quality
