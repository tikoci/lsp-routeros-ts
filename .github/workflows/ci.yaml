name: CI

# Runs on every push to main and on pull requests. Same compile/lint/test/smoke
# steps as the Build and Release workflow, but stops before packaging or
# publishing — release remains a deliberate human action via workflow_dispatch
# in build.yaml. This is the "did we break the LSP?" signal between releases.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel any in-flight CI runs for the same ref when a new commit lands; only
# the latest commit's signal is interesting.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # security-events read is needed for the AI findings probe (and for the
  # standard CodeQL alerts API). It costs nothing to grant on a read-only token.
  security-events: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        # node is needed for the smoke test's `--node server/dist/server.js` target
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install `bun`
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build project
        # `compile` chains client + server + exe + web. The standalone exe is
        # required by the stdio smoke test's `--standalone` target.
        run: bun run compile

      - name: Test (unit)
        run: bun run test

      - name: Lint (typecheck + biome)
        run: bun run lint

      - name: Test (stdio smoke)
        run: bun run test:smoke

      - name: AI findings probe (forward-compat)
        # GitHub's "Code Quality > AI findings" tab is in preview and not yet
        # reachable via REST/GraphQL (probed 2026-04-25, all candidate paths 404).
        # This step polls a handful of plausible endpoints; today it's a no-op
        # that prints a notice. Once GitHub ships a real API and one of these
        # returns 200, the step starts surfacing the count + first lines as a CI
        # notice — without ever blocking a PR. Promote to a failure (`exit 1`)
        # only when the findings have stabilized and the team agrees they're a
        # PR gate.
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -u
          paths=(
            "repos/${REPO}/code-quality/findings"
            "repos/${REPO}/code-quality/alerts"
            "repos/${REPO}/code-scanning/ai-alerts"
            "repos/${REPO}/security/quality"
            "repos/${REPO}/security/ai-findings"
          )
          found=""
          for p in "${paths[@]}"; do
            status=$(gh api -i "$p" 2>/dev/null | head -1 | awk '{print $2}' || true)
            if [ -n "$status" ] && [ "$status" != "404" ] && [ "$status" != "410" ]; then
              found="$p (HTTP $status)"
              break
            fi
          done
          if [ -z "$found" ]; then
            echo "::notice title=AI findings API::Not yet exposed via REST. Check https://github.com/${REPO}/security/quality/ai-findings in a browser. (Probed: ${paths[*]})"
            exit 0
          fi
          echo "::warning title=AI findings API now available::Endpoint ${found} responded — promote this step from probe to gate."
          gh api "${found%% *}" || true
