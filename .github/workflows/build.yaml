name: Build and Upload Artifacts

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install `bun`
        uses: oven-sh/setup-bun@v2
      
      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run compile

      - name: Package VSIX
        run: |
          npm run vsix:package
          mv lsp-routeros-ts-*.vsix lsp-routeros-ts.vsix

      - name: Package standalone "bun exe" for the native platform of CI
        run: npm run bun:exe

      - name: Package cross-platform version of standalone LSP server
        run: |
          for i in bun-linux-x64 bun-linux-arm64 bun-windows-x64 bun-darwin-x64 bun-darwin-arm64 bun-linux-x64-musl bun-linux-arm64-musl; do
            outname="${i#bun-}"
            bun build --compile ./server/src/server.ts --outfile ./lsp-routeros-server-$outname --target $i
          done
          chmod +x ./lsp-routeros-server*

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsp-routeros-ts.vsix
          path: lsp-routeros-ts.vsix

      - name: Upload lsp-routeros-server artifact for bun-linux-x64
        uses: actions/upload-artifact@v4
        with:
          name: lsp-routeros-server-linux-x64
          path: lsp-routeros-server-linux-x64

      - name: Upload lsp-routeros-server artifact for bun-linux-arm64
        uses: actions/upload-artifact@v4
        with:
          name: lsp-routeros-server-linux-arm64
          path: lsp-routeros-server-linux-arm64

      - name: Upload lsp-routeros-server artifact for bun-windows-x64
        uses: actions/upload-artifact@v4
        with:
          name: lsp-routeros-server-windows-x64.exe
          path: lsp-routeros-server-windows-x64.exe

      # disable - "bun-windows-arm64" target is failing, think it needs newer (or older) `bun` - requires investigation (and not easily testable)
      #- name: Upload lsp-routeros-server artifact for bun-windows-arm64
      #  uses: actions/upload-artifact@v4
      #  with:
      #    name: lsp-routeros-server-windows-arm64
      #    path: lsp-routeros-server-windows-arm64

      - name: Upload lsp-routeros-server artifact for bun-darwin-x64
        uses: actions/upload-artifact@v4
        with:
          name: lsp-routeros-server-darwin-x64
          path: lsp-routeros-server-darwin-x64

      - name: Upload lsp-routeros-server artifact for bun-darwin-arm64
        uses: actions/upload-artifact@v4
        with:
          name: lsp-routeros-server-darwin-arm64
          path: lsp-routeros-server-darwin-arm64

      - name: Upload lsp-routeros-server artifact for bun-linux-x64-musl
        uses: actions/upload-artifact@v4
        with:
          name: lsp-routeros-server-linux-x64-musl
          path: lsp-routeros-server-linux-x64-musl

      - name: Upload lsp-routeros-server artifact for bun-linux-arm64-musl
        uses: actions/upload-artifact@v4
        with:
          name: lsp-routeros-server-linux-arm64-musl
          path: lsp-routeros-server-linux-arm64-musl

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            Automated release from CI.
          files: |
            artifacts/lsp-routeros-ts.vsix
            artifacts/lsp-routeros-server-linux-x64
            artifacts/lsp-routeros-server-linux-arm64
            artifacts/lsp-routeros-server-windows-x64.exe
            artifacts/lsp-routeros-server-darwin-x64
            artifacts/lsp-routeros-server-darwin-arm64
            artifacts/lsp-routeros-server-linux-x64-musl
            artifacts/lsp-routeros-server-linux-arm64-musl