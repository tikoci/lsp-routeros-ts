name: Build and Release

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Publish as pre-release (odd minor version, e.g. 0.7.x)'
        required: true
        default: true
        type: boolean
      bump_type:
        description: 'Version bump to apply after publish (keeps package.json at next version)'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - skip

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install `bun`
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
      
      - name: Calculate LOCs
        run: |
          npx cloc --git HEAD

      - name: Build project
        run: bun run compile

      - name: Test (unit)
        run: bun run test

      - name: Lint
        run: bun run lint

      - name: Upload JavaScript .map files for symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-lsp-routeros-ts-maps
          path: |
            *.map
            ./dist/*
            ./**/dist/*
            **/*.bun-build

      - name: Package VSIX
        run: |
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            npm run vsix:package:prerelease
          else
            npm run vsix:package
          fi
          mv lsp-routeros-ts-*.vsix lsp-routeros-ts.vsix

      - name: Package standalone "bun exe" for the native platform of CI
        run: bun run compile:exe

      - name: Package cross-platform version of standalone LSP server
        run: |
          for i in bun-linux-x64 bun-linux-arm64 bun-darwin-x64 bun-darwin-arm64 bun-linux-x64-musl bun-linux-arm64-musl; do
            outname="${i#bun-}"
            bun build --compile ./server/src/server.ts --outfile ./lsp-routeros-server-$outname --target $i
            chmod 755 ./lsp-routeros-server-$outname
            zip ./lsp-routeros-server-$outname.zip ./lsp-routeros-server-$outname
          done

      - name: Package Windows version of standalone LSP server
        run: |
          bun build --compile ./server/src/server.ts --outfile ./lsp-routeros-server-windows-x64 --target bun-windows-x64
          ls -l ./lsp-routeros-server-windows-x64.exe
          chmod 755 ./lsp-routeros-server-windows-x64.exe
          zip ./lsp-routeros-server-windows-x64.zip ./lsp-routeros-server-windows-x64.exe
          bun build --compile ./server/src/server.ts --outfile ./lsp-routeros-server-windows-arm64 --target bun-windows-arm64
          ls -l ./lsp-routeros-server-windows-arm64.exe
          chmod 755 ./lsp-routeros-server-windows-arm64.exe
          zip ./lsp-routeros-server-windows-arm64.zip ./lsp-routeros-server-windows-arm64.exe

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsp-routeros-ts.vsix
          path: lsp-routeros-ts.vsix

      - name: Upload NeoVim Lua script artifact
        uses: actions/upload-artifact@v4
        with:
          name: nvim-routeros-lsp-init.lua
          path: nvim-routeros-lsp-init.lua

      - name: Upload lsp-routeros-server artifact for bun-linux-x64
        uses: actions/upload-artifact@v4
        with:
          name: lsp-routeros-server-linux-x64
          path: lsp-routeros-server-linux-x64.zip

      - name: Upload lsp-routeros-server artifact for bun-linux-arm64
        uses: actions/upload-artifact@v4
        with:
          name: lsp-routeros-server-linux-arm64
          path: lsp-routeros-server-linux-arm64.zip

      - name: Upload lsp-routeros-server artifact for bun-windows-x64
        uses: actions/upload-artifact@v4
        with:
          name: lsp-routeros-server-windows-x64
          path: lsp-routeros-server-windows-x64.zip

      - name: Upload lsp-routeros-server artifact for bun-windows-arm64
        uses: actions/upload-artifact@v4
        with:
          name: lsp-routeros-server-windows-arm64
          path: lsp-routeros-server-windows-arm64.zip

      - name: Upload lsp-routeros-server artifact for bun-darwin-x64
        uses: actions/upload-artifact@v4
        with:
          name: lsp-routeros-server-darwin-x64
          path: lsp-routeros-server-darwin-x64.zip

      - name: Upload lsp-routeros-server artifact for bun-darwin-arm64
        uses: actions/upload-artifact@v4
        with:
          name: lsp-routeros-server-darwin-arm64
          path: lsp-routeros-server-darwin-arm64.zip

      - name: Upload lsp-routeros-server artifact for bun-linux-x64-musl
        uses: actions/upload-artifact@v4
        with:
          name: lsp-routeros-server-linux-x64-musl
          path: lsp-routeros-server-linux-x64-musl.zip

      - name: Upload lsp-routeros-server artifact for bun-linux-arm64-musl
        uses: actions/upload-artifact@v4
        with:
          name: lsp-routeros-server-linux-arm64-musl
          path: lsp-routeros-server-linux-arm64-musl.zip

      - name: Get package version
        id: pkgver
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          name: v${{ steps.pkgver.outputs.version }}
          tag: v${{ steps.pkgver.outputs.version }}
          draft: false
          prerelease: ${{ inputs.prerelease }}
          allowUpdates: true
          updateOnlyUnreleased: true
          body: |
            **LSP Server for RouterOS** (v${{steps.pkgver.outputs.version}})

            > [!NOTE]
            >
            > "Known Issues" and "Changelog" can be found in [CHANGELOG.md](https://github.com/tikoci/lsp-routeros-ts/blob/main/CHANGELOG.md).
            >
            > See [README.md](https://github.com/tikoci/lsp-routeros-ts/README.md) for more details about installation and usage.
            >

            For *VSCode*, download `lsp-routeros-ts.vsix` and install use `code --install-extension lsp-routeros-ts.vsix` from your download directory.

            For *NeoVim or other LSP clients*, the easiest install is via npm: `npm install -g @tikoci/routeroslsp` (requires Node.js). Then configure NeoVim with the provided `nvim-routeros-lsp-init.lua`.

            Alternatively, download the pre-built `lsp-routeros-server-*` binary for your OS/platform from the assets below (no Node.js required).

            > _Note about download file names..._
            > `darwin-` in name is for macOS, with `-arm64` for Apple Silicon and `-x64` for Intel Macs.
            > `-musl` in name is for Alpine Linux or other musl-based distros.

          artifacts: |
            lsp-routeros-ts.vsix
            nvim-routeros-lsp-init.lua
            lsp-routeros-server-linux-x64.zip
            lsp-routeros-server-linux-arm64.zip
            lsp-routeros-server-windows-x64.zip
            lsp-routeros-server-windows-arm64.zip
            lsp-routeros-server-darwin-x64.zip
            lsp-routeros-server-darwin-arm64.zip
            lsp-routeros-server-linux-x64-musl.zip
            lsp-routeros-server-linux-arm64-musl.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # TODO: Publish release should be it's own build task, VSCode works and Open-VSX should too
      #
      - name: Publish to VSCode Marketplace
        run: |
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            npx @vscode/vsce publish --no-dependencies --pre-release -p ${{secrets.VSCE_PAT}}
          else
            npx @vscode/vsce publish --no-dependencies -p ${{secrets.VSCE_PAT}}
          fi
      - name: Publish to Open-VSX too
        run: npx ovsx publish lsp-routeros-ts.vsix -p ${{secrets.OVSX_PAT}}

      - name: Publish server to npm as @tikoci/routeroslsp
        if: ${{ env.NPM_TOKEN != '' }}
        run: npm run npm:publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Bump version and prepare CHANGELOG skeleton for next release
        if: ${{ inputs.bump_type != 'skip' }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          # Bump version in all three package.json files without creating a git commit/tag
          npm version ${{ inputs.bump_type }} --no-git-tag-version
          cd server && npm version ${{ inputs.bump_type }} --no-git-tag-version && cd ..
          cd client && npm version ${{ inputs.bump_type }} --no-git-tag-version && cd ..

          NEW_VERSION=$(node -p "require('./package.json').version")
          export NEW_VERSION
          IS_PRERELEASE="${{ inputs.prerelease }}"
          export IS_PRERELEASE

          # Prepend a skeleton CHANGELOG entry for the upcoming version
          python3 -c "
          import os
          v = os.environ['NEW_VERSION']
          label = ' (pre-release)' if os.environ['IS_PRERELEASE'] == 'true' else ''
          stub = '\n### ' + v + label + '\n\n#### Changes\n\n#### Fixes\n\n'
          with open('CHANGELOG.md') as f: c = f.read()
          c = c.replace('## Changelog\n', '## Changelog\n' + stub, 1)
          with open('CHANGELOG.md', 'w') as f: f.write(c)
          "

          git add package.json server/package.json client/package.json CHANGELOG.md
          git commit -m "chore: bump to v${NEW_VERSION} after publish [skip ci]"
          git push
